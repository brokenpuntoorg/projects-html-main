<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobina de Ignición - BOUF197 Mitsubishi</title>
    <link rel="stylesheet" href="/web/4/css/modulos/crhysler-1.css">

<body>

    <div class="main-container">
        <h1>SISTEMA DE ENCENDIDO - MITSUBISHI</h1>
        
        <div class="product-card">

                <span class="product-brand">MITSUBISHI</span>
            </header>

            <div class="product-main-info">
                <div class="product-image-section">
                    <img src="/web/4/css/assets/product/bobina-de-ignicion/mitsubishi-4.png" alt="Bobina BOUF197" class="product-image">

                    <thead>

                    </thead>
                    <tbody>
                        <tr>
                            <td>Montero Sport</td>
                            <td>97-04</td>

                        <tr>
                            <td>Montero</td>
                            <td>97-02</td>

                            <td>V6</td>
