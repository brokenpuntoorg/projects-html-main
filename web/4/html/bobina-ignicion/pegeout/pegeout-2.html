<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - BOP01 Peugeot</title>
    <link rel="stylesheet" href="/web/4/css/modulos/crhysler-1.css">
</head>
<body>

    <div class="main-container">
        <section class="product-module">

                    <span class="product-model">BOP01</span>

                <div class="product-main-content">

                    </div>
                    
                    <div class="product-details-section">
                        <div class="technical-specs">
                            <h3 class="specs-title">Especificaciones Técnicas</h3>
                            <div class="specs-grid">
                                <p><strong>Marca de Vehículo:</strong> Peugeot</p> <p><strong>Tipo:</strong> Bobina Externa</p> </div>
                        </div>
                    </div>
                </div>

                <div class="application-container">
                    <h3 class="applications-title">Tabla de Compatibilidad</h3>
                    <table class="application-table">
                        <thead>
                            <tr>
                                <th>Marca</th>
                                <th>Modelo</th>
                                <th>Año</th>
                                <th>Motor</th>
                                <th>Cilindros</th>

                        </thead>
                        <tbody>
                            <tr>
                                <td rowspan="3">Peugeot</td>
                                <td>205</td>
                                <td>83</td>
                                <td>1.1L / 1.4L / 1.6L</td>
                                <td>L4</td>
                            </tr>
                            <tr>
                                <td>309</td>
                                <td>88</td>
                                <td>1.3L</td>
                                <td>L4</td>
                            </tr>
                            <tr>
                                <td>405</td>
                                <td>89 - 97</td>
                                <td>1.6L / 1.9L</td>
                                <td>L4</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
