<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos - BON07 Nissan</title>
    <link rel="stylesheet" href="/web/4/css/modulos/crhysler-1.css">
</head>
<body>

    <div class="main-container">
        <section class="product-module">
            <div class="product-card">
                <header class="product-header">
                    <span class="product-model">BON07</span>
                    <span class="product-brand">NISSAN</span>
                </header>

                <div class="product-main-content">
                    <div class="product-image-section">
                        <img src="/web/4/css/assets/product/bobina-de-ignicion/nissan/2.png" alt="Bobina de Ignición BON07" class="product-image">
                    </div>
                    
                    <div class="product-details-section">
                        <div class="technical-specs">
                            <h3 class="specs-title">Especificaciones Técnicas</h3>
                            <div class="specs-grid">
                                <p><strong>Referencia Kem:</strong> IC-122</p> <p><strong>Referencia Injetech:</strong> 40171</p> <p><strong>Referencia Tecnofuel:</strong> 0551000</p> <p><strong>Observaciones:</strong> Lado Derecho</p> </div>
                        </div>
                    </div>
                </div>

                <div class="application-container">
                    <h3 class="applications-title">Tabla de Compatibilidad</h3>
                    <table class="application-table">
                        <thead>
                            <tr>
                                <th>Marca</th>
                                <th>Modelo</th>
                                <th>Año</th>
                                <th>Motor</th>
                                <th>Cilindros</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Infiniti</td>
                                <td>I30</td>
                                <td>2000 - 2001</td>
                                <td>3.0L</td>
                                <td>V6</td>
                            </tr>
                            <tr>
                                <td>Nissan</td>
                                <td>Maxima</td>
                                <td>2000 - 2001</td>
                                <td>3.0L</td>
                                <td>V6</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
