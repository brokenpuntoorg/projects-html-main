<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha Técnica - SD11933</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 20px;
      padding: 0;
    }
    .card-container {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .card-header {
      background-color: #0d233a;
      color: #ffffff;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-header h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.5px;
    }
    .card-header .brand {
      font-size: 18px;
      font-weight: bold;
      color: #00a8ff;
    }
    .card-body {
      padding: 20px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    .info-box {
      background-color: #f8f9fa;
      border-left: 4px solid #00a8ff;
      padding: 10px 15px;
      border-radius: 4px;
    }
    .info-box span.label {
      display: block;
      font-size: 12px;
      color: #6c757d;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .info-box span.value {
      font-size: 16px;
      color: #212529;
      font-weight: 600;
    }
    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #e0e0e0;
      padding: 10px 12px;
      text-align: center;
    }
    th {
      background-color: #1e3a5f;
      color: #ffffff;
      font-weight: 600;
    }
    tr:nth-child(even) {
      background-color: #f9fbfd;
    }
    tr:hover {
      background-color: #f1f5f9;
    }
  </style>
</head>
<body>

<div class="card-container">
  <!-- Encabezado con Código y Marca -->
  <div class="card-header">
    <h2>SD11933</h2>
    <span class="brand">Mitsubishi</span>
  </div>

  <div class="card-body">
    <!-- Información General y OEM -->
    <div class="info-grid">
      <div class="info-box">
        <span class="label">Número OEM</span>
        <span class="value">250-24020</span>
      </div>
      <div class="info-box">
        <span class="label">Observaciones</span>
        <span class="value">4 Cables 33 cm A.C.C.</span>
      </div>
    </div>

    <!-- Tabla de Aplicaciones -->
    <h3>Tabla de Aplicaciones</h3>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Línea</th>
            <th>Marca</th>
            <th>Aplicación</th>
            <th>Años</th>
            <th>Desplazamiento</th>
            <th>Cilindros</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>OS</td>
            <td>Mitsubishi</td>
            <td>Galant</td>
            <td>94-98</td>
            <td>2.4L</td>
            <td>L4</td>
          </tr>
          <tr>
            <td>OS</td>
            <td>Mitsubishi</td>
            <td>Mirage</td>
            <td>93-96</td>
            <td>1.5L</td>
            <td>L4</td>
          </tr>
          <tr>
            <td>OS</td>
            <td>Mitsubishi</td>
            <td>Mirage</td>
            <td>93-96</td>
            <td>1.8L</td>
            <td>L4</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>
