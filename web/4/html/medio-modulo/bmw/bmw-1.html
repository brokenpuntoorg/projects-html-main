<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomba de Gasolina - FP1180 BMW</title>
    <link rel="stylesheet" href="/web/4/css/modulos/ford-1.css">
</head>
<body>

    <div class="main-container">
        <h1>BOMBAS DE GASOLINA - LÍNEA BMW</h1>
        
        <div class="product-card">
            <header class="product-header">
                <span class="product-model">FP1180</span>
                <span class="product-brand">BMW</span>
            </header>

            <div class="product-main-info">
                <div class="product-image-section">
                    <img src="/web/4/css/assets/product/bombas/FP1180.png" alt="Módulo de Combustible FP1180" class="product-image">
                </div>
                
                <div class="product-details-section">
                    <div class="technical-specs">
                        <h3 class="specs-title">Características Técnicas</h3>
                        <div class="performance-specs">
                            <table>
                                <tr>
                                    <td>Presión de Operación</td>
                                    <td>60 PSI</td> </tr>
                                <tr>
                                    <td>Litros Por Minuto</td>
                                    <td>2.0</td> </tr>
                                <tr>
                                    <td>Observaciones</td>
                                    <td>Vin N51B30A</td> </tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="application-table">
                <h3 class="applications-title">Aplicaciones Principales</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Modelo</th>
                            <th>Años</th>
                            <th>Motor</th>
                            <th>Cilindros</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>128i</td>
                            <td>08-13</td>
                            <td>3.0L</td>
                            <td>L6</td>
                        </tr>
                        <tr>
                            <td>328i / 328i xDrive</td>
                            <td>07-13</td>
                            <td>3.0L</td>
                            <td>L6</td>
                        </tr>
                        <tr>
                            <td>328xi</td>
                            <td>07-08</td>
                            <td>3.0L</td>
                            <td>L6</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
</body>
</html>
